<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="tbL9YP7_deJ_Viikdh21CTSC_svc83meSiUfoq1oipY" />
    <title>Base64.web | Clean & Fast File Converter</title>
    <link rel="stylesheet" href="/src/styles.css" />
    
    <script>
        (function () {
            const savedTheme = localStorage.getItem('data-theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <h2 class="logo">base64<span>.web</span></h2>
        </div>
        
        <div class="nav-center">
            <div class="time-display">
                <span class="label">Time:</span>
                <span id="current-time">--:--:--</span>
            </div>
        </div>

        <div class="nav-right" style="display: flex; align-items: center;">
            <div class="nav-links">
                <ul>
                    <li><a id="encode-btn">Encode</a></li>
                    <li><a id="decode-btn">Decode</a></li>
                </ul>
            </div>
            <button id="toggle-theme" aria-label="Toggle Theme">
                Theme
            </button>
        </div>
    </nav>

    <main class="main-container" id="main-container">
        <header class="hero-section">
            <h1>Convert Files to Base64</h1>
            <p>Securely encode your images and documents locally in your browser.</p>
        </header>

        <section class="converter-box" id="dragtarget">
            <label for="file-input" class="file-label">
                <div class="upload-icon">📁</div>
                <span>Click to browse or drag & drop files here</span>
                <input type="file" id="file-input" multiple hidden>
            </label>
        </section>

        <section class="display-box">
            <h3>Selected Files</h3>
            <ul id="selected-files">
                <li class="placeholder-text">No files selected yet. Your encoded strings will appear here.</li>
            </ul>
        </section>
    </main>

    <script type="module" src="/src/index.js"></script>
</body>
</html>
